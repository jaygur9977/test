<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Automation Interface</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 450px; background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { text-align: center; color: #38bdf8; margin-top: 0; }
        textarea { width: 100%; height: 100px; border-radius: 8px; border: none; padding: 10px; background: #334155; color: white; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 8px; background: linear-gradient(90deg, #0ea5e9, #2563eb); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        #output { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; font-size: 0.9em; line-height: 1.5; border-left: 4px solid #38bdf8; min-height: 50px; white-space: pre-wrap; }
        .loading { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Prompt Engine</h2>
    <textarea id="prompt" placeholder="Ask something..."></textarea>
    <button onclick="sendPrompt()">Execute Automation</button>
    <div id="output">Response will appear here...</div>
</div>

<script>
    async function sendPrompt() {
        const prompt = document.getElementById('prompt').value;
        const output = document.getElementById('output');
        
        if(!prompt) return alert("Please enter a prompt");

        output.innerHTML = '<span class="loading">Processing through Playwright...</span>';

        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: prompt })
        });

        const data = await response.json();
        output.innerText = data.reply;
    }
</script>
</body>
</html>
