<!DOCTYPE html>
<html>
<head>

<title>AI Automation</title>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh
}

.box{
width:420px;
background:#1e293b;
padding:25px;
border-radius:12px
}

textarea{
width:100%;
height:120px;
background:#334155;
border:none;
padding:10px;
color:white;
border-radius:6px
}

button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px
}

#output{
margin-top:12px;
background:#020617;
padding:10px;
border-radius:6px;
white-space:pre-wrap
}

</style>

</head>

<body>

<div class="box">

<h2>Prompt Engine</h2>

<textarea id="prompt"></textarea>

<button onclick="send()">Send</button>

<div id="output"></div>

</div>

<script>

async function send(){

const prompt=document.getElementById("prompt").value
const output=document.getElementById("output")

output.innerText="processing..."

const res = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:prompt})
})

const data = await res.json()

output.innerText=data.reply

}

</script>

</body>
</html>
